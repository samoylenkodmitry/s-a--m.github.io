name: Sync LeetCode Library

on:
  push:
    branches:
      - master
    paths:
      - "_leetcode_source/2023-07-14-leetcode_daily.md"
      - "scripts/generate_leetcode_library.py"
      - "scripts/analyze_leetcode_ai.py"
      - "_data/leetcode_ai_analysis.json"
      - "_layouts/leetcode-*.html"
      - "_includes/leetcode-card.html"
      - "assets/leetcode/**"
      - "leetcode/index.md"
      - "leetcode/language/**"

permissions:
  contents: write
  models: read

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Analyze new LeetCode blocks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LEETCODE_AI_MODEL: openai/gpt-4.1-mini
          LEETCODE_AI_LIMIT: "4"
        run: python3 scripts/analyze_leetcode_ai.py --provider github --model "$LEETCODE_AI_MODEL" --limit "$LEETCODE_AI_LIMIT" --soft-fail

      - name: Regenerate library
        run: python3 scripts/generate_leetcode_library.py

      - name: Commit generated files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/leetcode_ai_analysis.json _data/leetcode_library.json leetcode/pattern leetcode/problem leetcode/year leetcode/collection leetcode/evolution
          git commit -m "Sync LeetCode library"
          git push
